<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="co-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0050a0"/>
      <stop offset="100%" stop-color="#002850"/>
    </linearGradient>
    <linearGradient id="co-yellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe040"/>
      <stop offset="100%" stop-color="#f0c800"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#co-bg)"/>
  <!-- Costa iconic funnel shape -->
  <g>
    <!-- Funnel body — yellow with characteristic C -->
    <path d="M23 12 L41 12 L39 42 L25 42 Z" fill="url(#co-yellow)" stroke="#c8a000" stroke-width="0.5"/>
    <!-- Blue C on funnel -->
    <path d="M38 23 A8 8 0 1 0 38 33" fill="none" stroke="#002850" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Funnel top rim -->
    <rect x="22" y="10" width="20" height="3" rx="1" fill="url(#co-yellow)" stroke="#c8a000" stroke-width="0.3"/>
    <!-- Funnel stripe -->
    <line x1="25.5" y1="38" x2="38.5" y2="38" stroke="#002850" stroke-width="1.5"/>
  </g>
  <!-- Ship hull below -->
  <path d="M12 46 L52 46 L48 52 L16 52 Z" fill="#fff" opacity="0.9"/>
  <!-- Waterline -->
  <path d="M10 56 Q20 52 32 56 Q44 60 54 56" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
