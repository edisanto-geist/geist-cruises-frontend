<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ncl-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#081d3a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#ncl-bg)"/>
  <!-- NCL hull art inspired sun/starburst pattern -->
  <g fill="#fff">
    <!-- Central sun burst — inspired by NCL's painted hull art -->
    <circle cx="32" cy="28" r="8" fill="#fff" opacity="0.15"/>
    <circle cx="32" cy="28" r="5" fill="#fff"/>
    <!-- Rays -->
    <g stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.9">
      <line x1="32" y1="14" x2="32" y2="19"/>
      <line x1="32" y1="37" x2="32" y2="42"/>
      <line x1="18" y1="28" x2="23" y2="28"/>
      <line x1="41" y1="28" x2="46" y2="28"/>
      <line x1="22.1" y1="18.1" x2="25.6" y2="21.6"/>
      <line x1="38.4" y1="34.4" x2="41.9" y2="37.9"/>
      <line x1="41.9" y1="18.1" x2="38.4" y2="21.6"/>
      <line x1="25.6" y1="34.4" x2="22.1" y2="37.9"/>
    </g>
  </g>
  <!-- Ocean waves at bottom -->
  <path d="M8 50 Q16 45 24 50 Q32 55 40 50 Q48 45 56 50" fill="none" stroke="#00b4d8" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M8 55 Q16 50 24 55 Q32 60 40 55 Q48 50 56 55" fill="none" stroke="#00b4d8" stroke-width="1.3" stroke-linecap="round" opacity="0.4"/>
</svg>
