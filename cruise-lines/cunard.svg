<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="cu-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="cu-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#a07828"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#cu-bg)"/>
  <!-- Cunard shield outline -->
  <path d="M18 12 L46 12 L46 38 Q46 50 32 56 Q18 50 18 38 Z" fill="none" stroke="url(#cu-gold)" stroke-width="2"/>
  <!-- Inner shield -->
  <path d="M21 15 L43 15 L43 37 Q43 47 32 52 Q21 47 21 37 Z" fill="none" stroke="url(#cu-gold)" stroke-width="0.8" opacity="0.4"/>
  <!-- Rampant lion — simplified heraldic form -->
  <g fill="#c8102e" stroke="#8b0000" stroke-width="0.3">
    <!-- Body -->
    <path d="M28 40 Q26 36 27 32 Q28 28 30 26 Q32 24 34 26 L36 28 Q38 26 39 28 Q40 30 38 32 L36 30 Q37 34 36 38 Q35 40 33 42 Z"/>
    <!-- Head -->
    <circle cx="34" cy="24" r="3" fill="#c8102e"/>
    <!-- Front paw raised -->
    <path d="M30 26 L26 20 L28 19" fill="none" stroke="#c8102e" stroke-width="2" stroke-linecap="round"/>
    <!-- Back paw -->
    <path d="M33 42 L30 44" fill="none" stroke="#c8102e" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Tail -->
    <path d="M36 38 Q40 36 42 32 Q43 30 42 28" fill="none" stroke="#c8102e" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <!-- Gold accent line -->
  <line x1="14" y1="60" x2="50" y2="60" stroke="url(#cu-gold)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
