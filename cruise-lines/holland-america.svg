<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="hal-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003d73"/>
      <stop offset="100%" stop-color="#001e3a"/>
    </linearGradient>
    <linearGradient id="hal-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af5a"/>
      <stop offset="50%" stop-color="#f0d080"/>
      <stop offset="100%" stop-color="#b8923a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#hal-bg)"/>
  <!-- HAL compass rose — four cardinal points -->
  <g fill="url(#hal-gold)" stroke="#a07828" stroke-width="0.3">
    <!-- North point -->
    <polygon points="32,8 35,26 32,23 29,26"/>
    <!-- South point -->
    <polygon points="32,52 35,34 32,37 29,34"/>
    <!-- East point -->
    <polygon points="52,30 34,27 37,30 34,33"/>
    <!-- West point -->
    <polygon points="12,30 30,27 27,30 30,33"/>
  </g>
  <!-- Diagonal points (smaller) -->
  <g fill="url(#hal-gold)" opacity="0.5" stroke="none">
    <polygon points="44.1,15.9 36,26 38,28"/>
    <polygon points="19.9,15.9 28,26 26,28"/>
    <polygon points="44.1,44.1 36,34 38,32"/>
    <polygon points="19.9,44.1 28,34 26,32"/>
  </g>
  <!-- Center circle -->
  <circle cx="32" cy="30" r="5" fill="#003d73" stroke="url(#hal-gold)" stroke-width="1.5"/>
  <circle cx="32" cy="30" r="2" fill="url(#hal-gold)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="30" r="22" fill="none" stroke="url(#hal-gold)" stroke-width="1" opacity="0.4"/>
  <!-- HAL text -->
  <text x="32" y="60" font-family="Georgia,serif" font-size="6.5" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="2.5">HAL</text>
</svg>
