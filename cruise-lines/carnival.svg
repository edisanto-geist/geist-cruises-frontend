<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ca-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#002868"/>
      <stop offset="100%" stop-color="#001440"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#ca-bg)"/>
  <!-- Carnival iconic split funnel — the whale tail shape -->
  <g>
    <!-- Left wing (red) -->
    <path d="M22 42 L26 16 Q28 10 32 14 L30 42 Z" fill="#e31937"/>
    <!-- Right wing (blue) -->
    <path d="M34 42 L32 14 Q36 10 38 16 L42 42 Z" fill="#fff"/>
    <!-- Center overlap -->
    <path d="M30 42 L32 14 L34 42 Z" fill="#002868"/>
    <!-- Funnel tip curves (whale tail effect) -->
    <path d="M26 16 Q24 10 20 8" fill="none" stroke="#e31937" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M38 16 Q40 10 44 8" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Base platform -->
  <rect x="18" y="42" width="28" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>
  <!-- Waves -->
  <path d="M8 52 Q18 48 28 52 Q38 56 48 52 Q53 50 56 52" fill="none" stroke="#4aa8d8" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M8 56 Q18 52 28 56 Q38 60 48 56 Q53 54 56 56" fill="none" stroke="#4aa8d8" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
</svg>
