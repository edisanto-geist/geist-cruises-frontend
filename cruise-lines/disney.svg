<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="di-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a3e"/>
      <stop offset="100%" stop-color="#060e22"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#di-bg)"/>
  <!-- Mickey ears silhouette — the iconic Disney symbol -->
  <g fill="#fff">
    <!-- Head -->
    <circle cx="32" cy="30" r="11"/>
    <!-- Left ear -->
    <circle cx="21.5" cy="19" r="7.5"/>
    <!-- Right ear -->
    <circle cx="42.5" cy="19" r="7.5"/>
  </g>
  <!-- Subtle inner shadow on head -->
  <circle cx="32" cy="30" r="11" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
  <!-- Stars sparkle -->
  <g fill="#fff" opacity="0.6">
    <circle cx="14" cy="14" r="1"/>
    <circle cx="50" cy="12" r="0.8"/>
    <circle cx="10" cy="32" r="0.6"/>
    <circle cx="54" cy="28" r="0.7"/>
    <circle cx="16" cy="48" r="0.5"/>
    <circle cx="48" cy="46" r="0.6"/>
  </g>
  <!-- Cruise waves below -->
  <path d="M8 50 Q18 46 28 50 Q38 54 48 50 Q53 48 56 50" fill="none" stroke="#4aa8d8" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M8 54 Q18 50 28 54 Q38 58 48 54 Q53 52 56 54" fill="none" stroke="#4aa8d8" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
