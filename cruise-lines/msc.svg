<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="msc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003874"/>
      <stop offset="100%" stop-color="#001e42"/>
    </linearGradient>
    <linearGradient id="msc-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d068"/>
      <stop offset="100%" stop-color="#c09030"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#msc-bg)"/>
  <!-- Outer compass circle -->
  <circle cx="32" cy="30" r="20" fill="none" stroke="#fff" stroke-width="1.5"/>
  <circle cx="32" cy="30" r="17" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <!-- Compass cardinal points -->
  <g stroke="#fff" stroke-width="1.5" stroke-linecap="round">
    <line x1="32" y1="10" x2="32" y2="13.5"/>
    <line x1="32" y1="46.5" x2="32" y2="50"/>
    <line x1="12" y1="30" x2="15.5" y2="30"/>
    <line x1="48.5" y1="30" x2="52" y2="30"/>
  </g>
  <!-- Diagonal compass points (smaller) -->
  <g stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.6">
    <line x1="17.9" y1="15.9" x2="19.7" y2="17.7"/>
    <line x1="44.3" y1="42.3" x2="46.1" y2="44.1"/>
    <line x1="46.1" y1="15.9" x2="44.3" y2="17.7"/>
    <line x1="19.7" y1="42.3" x2="17.9" y2="44.1"/>
  </g>
  <!-- Wave divider across center -->
  <path d="M15 30 Q20 26.5 25 30 Q30 33.5 35 30 Q40 26.5 45 30 Q47 31.5 49 30" fill="none" stroke="url(#msc-gold)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- M above wave -->
  <text x="32" y="27" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">M</text>
  <!-- S C below wave -->
  <text x="25" y="40" font-family="Georgia,serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">S</text>
  <text x="39" y="40" font-family="Georgia,serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">C</text>
  <!-- Gold bottom accent -->
  <line x1="16" y1="57" x2="48" y2="57" stroke="url(#msc-gold)" stroke-width="1.8" stroke-linecap="round"/>
</svg>
