<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ss-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="ss-silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="40%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#ss-bg)"/>
  <!-- Silversea elegant S monogram -->
  <path d="M24 16 Q24 12 30 12 L36 12 Q42 12 42 18 Q42 24 36 26 L28 28 Q22 30 22 36 Q22 42 28 42 L36 42 Q42 42 42 38"
    fill="none" stroke="url(#ss-silver)" stroke-width="3" stroke-linecap="round"/>
  <!-- Decorative serif terminals -->
  <line x1="20" y1="12" x2="28" y2="12" stroke="url(#ss-silver)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="42" x2="46" y2="42" stroke="url(#ss-silver)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Subtle wave motif -->
  <path d="M10 52 Q20 48 32 52 Q44 56 54 52" fill="none" stroke="url(#ss-silver)" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <!-- SILVERSEA text -->
  <text x="32" y="60" font-family="Georgia,serif" font-size="5" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">SILVERSEA</text>
</svg>
