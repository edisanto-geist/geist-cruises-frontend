<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="az-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c2d5e"/>
      <stop offset="100%" stop-color="#061630"/>
    </linearGradient>
    <linearGradient id="az-silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#az-bg)"/>
  <!-- Azamara compass rose — elegant 8-point star -->
  <g fill="url(#az-silver)" stroke="#8a9bb5" stroke-width="0.3">
    <!-- Cardinal points (long) -->
    <polygon points="32,6 34,26 32,22 30,26"/>
    <polygon points="32,54 34,34 32,38 30,34"/>
    <polygon points="6,30 26,28 22,30 26,32"/>
    <polygon points="58,30 38,28 42,30 38,32"/>
    <!-- Intercardinal points (shorter) -->
    <polygon points="45,13 36,26 38,28" opacity="0.6"/>
    <polygon points="19,13 28,26 26,28" opacity="0.6"/>
    <polygon points="45,47 36,34 38,32" opacity="0.6"/>
    <polygon points="19,47 28,34 26,32" opacity="0.6"/>
  </g>
  <!-- Outer compass ring -->
  <circle cx="32" cy="30" r="24" fill="none" stroke="url(#az-silver)" stroke-width="0.8" opacity="0.3"/>
  <!-- Center -->
  <circle cx="32" cy="30" r="5" fill="#0c2d5e" stroke="url(#az-silver)" stroke-width="1.2"/>
  <circle cx="32" cy="30" r="2" fill="url(#az-silver)"/>
  <!-- AZAMARA text -->
  <text x="32" y="61" font-family="Georgia,serif" font-size="5.5" font-weight="400" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1.8">AZAMARA</text>
</svg>
