<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="rc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a3d7c"/>
      <stop offset="100%" stop-color="#012356"/>
    </linearGradient>
    <linearGradient id="rc-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd86e"/>
      <stop offset="100%" stop-color="#c9a030"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#rc-bg)"/>
  <!-- Anchor -->
  <g fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Ring at top -->
    <circle cx="32" cy="22" r="3.5" fill="none"/>
    <!-- Shaft -->
    <line x1="32" y1="25.5" x2="32" y2="50"/>
    <!-- Crossbar -->
    <line x1="21" y1="38" x2="43" y2="38"/>
    <!-- Left fluke -->
    <path d="M21 38 L18 46 Q18 52 26 52 L28 50"/>
    <!-- Right fluke -->
    <path d="M43 38 L46 46 Q46 52 38 52 L36 50"/>
    <!-- Left fluke point -->
    <path d="M18 46 L15.5 44.5" stroke-width="2"/>
    <!-- Right fluke point -->
    <path d="M46 46 L48.5 44.5" stroke-width="2"/>
  </g>
  <!-- Crown -->
  <g fill="url(#rc-gold)" stroke="#b8892a" stroke-width="0.5">
    <!-- Crown base band -->
    <rect x="24" y="17" width="16" height="4" rx="0.8"/>
    <!-- Crown points -->
    <path d="M24 17 L24 11 L26.5 14 L29 10 L32 14 L35 10 L37.5 14 L40 11 L40 17 Z"/>
    <!-- Crown jewels -->
    <circle cx="24" cy="10.5" r="1.5" stroke="none"/>
    <circle cx="29" cy="9" r="1.5" stroke="none"/>
    <circle cx="32" cy="13" r="1.2" fill="#fff" stroke="none" opacity="0.6"/>
    <circle cx="35" cy="9" r="1.5" stroke="none"/>
    <circle cx="40" cy="10.5" r="1.5" stroke="none"/>
  </g>
</svg>
